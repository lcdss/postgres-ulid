name: CI

on:
  pull_request:
  push:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: python3 -m pip install -r requirements-dev.txt

      - name: Run unit tests
        run: python3 -m pytest -v
