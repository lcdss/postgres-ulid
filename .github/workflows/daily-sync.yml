name: Daily Sync

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      has_work: ${{ steps.plan.outputs.has_work }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - id: plan
        name: Build publish matrix
        run: |
          python3 -m scripts.mirror.cli --output matrix.json
          python3 - <<'PY'
          import json
          import os

          with open("matrix.json", encoding="utf-8") as handle:
              payload = json.load(handle)

          matrix = json.dumps(payload, separators=(",", ":"))
          has_work = "true" if payload["include"] else "false"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"matrix={matrix}\n")
              output.write(f"has_work={has_work}\n")
          PY

  publish:
    needs: plan
    if: needs.plan.outputs.has_work == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Materialize publish plan
        env:
          PUBLISH_PLAN_JSON: ${{ needs.plan.outputs.matrix }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads(os.environ["PUBLISH_PLAN_JSON"])
          Path("publish-plan.json").write_text(
              json.dumps(payload),
              encoding="utf-8",
          )
          PY

      - name: Publish missing tags
        run: |
          python3 - <<'PY'
          import json
          import subprocess
          from pathlib import Path

          plan = json.loads(Path("publish-plan.json").read_text(encoding="utf-8"))

          for item in plan["include"]:
              digest = item["digest"]
              base_image = item["base_image"]
              tags = [f"lcdss/postgres-ulid:{tag}" for tag in item["target_tags"]]

              verify_cmd = [
                  "docker",
                  "buildx",
                  "build",
                  ".",
                  "--file",
                  "./Dockerfile",
                  "--build-arg",
                  f"BASE_IMAGE={base_image}",
                  "--tag",
                  "postgres-ulid:verify",
                  "--load",
                  "--cache-from",
                  f"type=gha,scope={digest}",
                  "--cache-to",
                  f"type=gha,mode=max,scope={digest}",
              ]
              subprocess.run(verify_cmd, check=True)
              subprocess.run(
                  ["./scripts/verify-image.sh", "postgres-ulid:verify"],
                  check=True,
              )

              push_cmd = [
                  "docker",
                  "buildx",
                  "build",
                  ".",
                  "--file",
                  "./Dockerfile",
                  "--build-arg",
                  f"BASE_IMAGE={base_image}",
                  "--push",
                  "--cache-from",
                  f"type=gha,scope={digest}",
                  "--cache-to",
                  f"type=gha,mode=max,scope={digest}",
              ]
              for tag in tags:
                  push_cmd.extend(["--tag", tag])

              subprocess.run(push_cmd, check=True)
          PY
