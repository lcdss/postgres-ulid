name: Daily Sync

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      has_work: ${{ steps.plan.outputs.has_work }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - id: plan
        name: Build publish matrix
        run: |
          python3 -m scripts.mirror.cli --output matrix.json
          python3 - <<'PY'
          import json
          import os

          with open("matrix.json", encoding="utf-8") as handle:
              payload = json.load(handle)

          matrix = json.dumps(payload, separators=(",", ":"))
          has_work = "true" if payload["include"] else "false"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"matrix={matrix}\n")
              output.write(f"has_work={has_work}\n")
          PY

  publish:
    needs: plan
    if: needs.plan.outputs.has_work == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: tags
        name: Expand publish tags
        env:
          TARGET_TAGS_JSON: ${{ toJson(matrix.target_tags) }}
        run: |
          python3 - <<'PY'
          import json
          import os

          tags = json.loads(os.environ["TARGET_TAGS_JSON"])
          publish_tags = "\n".join(
              f"lcdss/postgres-ulid:{tag}" for tag in tags
          )

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write("publish_tags<<EOF\n")
              output.write(publish_tags + "\n")
              output.write("EOF\n")
          PY

      - name: Build verification image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            BASE_IMAGE=${{ matrix.base_image }}
          tags: postgres-ulid:verify
          load: true
          cache-from: type=gha,scope=${{ matrix.digest }}
          cache-to: type=gha,mode=max,scope=${{ matrix.digest }}

      - name: Verify image contents
        run: ./scripts/verify-image.sh postgres-ulid:verify

      - name: Push mirrored tags
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            BASE_IMAGE=${{ matrix.base_image }}
          tags: ${{ steps.tags.outputs.publish_tags }}
          push: true
          cache-from: type=gha,scope=${{ matrix.digest }}
